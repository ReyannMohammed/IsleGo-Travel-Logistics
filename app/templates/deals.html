{% extends 'base.html' %}
{% block content %}
<div class="content-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="h4 mb-1">Current Deals</h2>
            <p class="text-muted mb-0">Hand-picked packages and limited-time offers.</p>
        </div>
        <a href="{{ url_for('new_booking') }}" class="btn btn-success">Book a Deal</a>
    </div>
    <div class="row g-4">
        {% for d in deals %}
        <div class="col-md-4">
            <div class="feature-card">
                <img src="{{ d.image }}" alt="{{ d.title }}">
                <div class="card-body">
                    <h5>{{ d.title }}</h5>
                    <p class="text-muted">{{ d.desc }}</p>
                    <a href="{{ url_for('new_booking') }}" class="btn btn-primary btn-sm">Book Now</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
