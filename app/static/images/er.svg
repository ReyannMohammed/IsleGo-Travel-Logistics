<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320">
  <rect x="20" y="20" width="240" height="120" rx="12" fill="#fff" stroke="#0f4c81"/>
  <text x="40" y="50" fill="#0f4c81" font-size="16" font-family="Segoe UI">Clients</text>
  <text x="40" y="72" fill="#17324d" font-size="12">id (PK)</text>
  <text x="40" y="90" fill="#17324d" font-size="12">name</text>
  <text x="40" y="108" fill="#17324d" font-size="12">email</text>

  <rect x="300" y="20" width="360" height="160" rx="12" fill="#fff" stroke="#0f4c81"/>
  <text x="320" y="50" fill="#0f4c81" font-size="16" font-family="Segoe UI">Bookings</text>
  <text x="320" y="72" fill="#17324d" font-size="12">id (PK)</text>
  <text x="320" y="90" fill="#17324d" font-size="12">booking_code (unique)</text>
  <text x="320" y="108" fill="#17324d" font-size="12">destination</text>
  <text x="320" y="126" fill="#17324d" font-size="12">travel_date</text>
  <text x="320" y="144" fill="#17324d" font-size="12">client_id (FK)</text>

  <line x1="260" y1="80" x2="300" y2="120" stroke="#0f4c81" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0f4c81" />
    </marker>
  </defs>
</svg>
